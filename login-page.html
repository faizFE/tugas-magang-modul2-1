<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-login.css">
    <title>Login Page</title>
</head>

<body>
    <div class="daftar">
        <form>
            <h3>Form Pendaftaran</h3>
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email aktif" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Buat password" required>
            <button type="submit" class="button">Daftar</button>
        </form>
    </div>
    <div class="login">
        <form>
            <h3>Form Login</h3>
            <label for="email_login">Email</label>
            <input type="email" id="email_login" placeholder="Email aktif" required>
            <label for="password_login">Password</label>
            <input type="password" id="password_login" placeholder="Masukkan password" required>
            <button type="submit" class="btn">Masuk</button>
        </form>
    </div>
</body>

</html>
