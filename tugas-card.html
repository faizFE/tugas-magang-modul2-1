<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-card.css">
    <title>Card flex</title>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="https://i.pinimg.com/736x/61/f2/b5/61f2b55e54e7f73f6edb320ec25a05fe.jpg" alt="gambar rumah"
                class="img">
            <div>
                <span class="title">Iceland Cabin</span>
                <br>
                <span class="text">$680 per night</span>
                <p class="text">Cozy cabin nestled in Iceland's breathtaking landscape, offering stunning views of mountains and Northern Lights.</p>
            </div>
            <div class="wrap">
                <div class="box">
                    <span class="text">Days</span>
                    <span class="number">3</span>
                </div>
                <div class="box">
                    <span class="text">Rating</span>
                    <span class="number">4.9</span>
                </div>
            </div>
            <button>Reserve</button>
        </div>
    </div>
</body>

</html>
